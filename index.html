<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biathlon Market – рейтинг биатлонистов</title>

  <!-- Bootstrap 5 + иконки -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* ===== ПЕРЕМЕННЫЕ ДЛЯ ТЕМ ===== */
    :root {
      --bg-body: #f8f9fa;
      --text-color: #212529;
      --card-bg: #ffffff;
      --card-shadow: 0 2px 8px rgba(0,0,0,0.06);
      --border-color: #e9ecef;
      --input-bg: #ffffff;
      --input-border: #ced4da;
      --dark-blue: #0d47a1;
      --red: #c62828;
      --hover-bg: #f1f3f5;
      --medal-gold: #ffc107;
      --medal-silver: #9e9e9e;
      --medal-bronze: #cd7f32;
      --logo-filter: none;
    }

    /* ===== ТЁМНАЯ ТЕМА ===== */
    body.dark-theme {
      --bg-body: #0a0e1a;
      --text-color: #e8eaf6;
      --card-bg: #1a1a2e;
      --card-shadow: 0 2px 8px rgba(0,0,0,0.4);
      --border-color: #2a2a4a;
      --input-bg: #2a2a4a;
      --input-border: #4a4a6a;
      --dark-blue: #42a5f5;
      --red: #ef5350;
      --hover-bg: #2a2a4a;
      --medal-gold: #ffd54f;
      --medal-silver: #bdbdbd;
      --medal-bronze: #e0a97a;
      --logo-filter: brightness(0) invert(1);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-body);
      color: var(--text-color);
      padding-bottom: 2rem;
      transition: background 0.3s, color 0.3s;
    }

    /* ===== НАВБАР ===== */
    .navbar-custom {
      background: var(--dark-blue);
      border-bottom: 3px solid var(--red);
      padding: 0.8rem 0;
      transition: background 0.3s;
    }

    .navbar-custom .brand {
      font-weight: 800;
      font-size: 1.6rem;
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .navbar-custom .brand span { color: var(--red); }
    .navbar-custom .brand img {
      height: 40px;
      width: auto;
      transition: transform 0.3s, filter 0.3s;
      filter: var(--logo-filter);
    }
    /* увеличенный логотип */
    .navbar-custom .brand.logo-expanded img {
      transform: scale(1.6);
      transition: transform 0.3s;
    }
    .navbar-custom .brand .logo-caption {
      display: block;
      font-size: 0.9rem;
      color: white;
      opacity: 0;
      transition: opacity 0.3s;
      text-align: center;
      margin-top: 4px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .navbar-custom .brand.logo-expanded .logo-caption {
      opacity: 1;
    }

    .navbar-custom .update-info {
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lang-btn, .theme-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .lang-btn:hover, .lang-btn.active,
    .theme-btn:hover {
      background: var(--red);
      border-color: var(--red);
    }
    .theme-btn i { font-size: 1rem; }

    /* ===== СТАТИСТИКА ===== */
    .stats-bar {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin: 1.5rem 0;
      box-shadow: var(--card-shadow);
      border-left: 4px solid var(--red);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .stat-item .number {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--dark-blue);
    }
    .stat-item .label {
      font-size: 0.85rem;
      color: var(--text-color);
      opacity: 0.7;
    }

    /* ===== ВКЛАДКИ ===== */
    .tab-section {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      box-shadow: var(--card-shadow);
      margin-bottom: 1.5rem;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .nav-tabs .nav-link {
      color: var(--text-color);
      font-weight: 600;
      border: none;
      border-bottom: 3px solid transparent;
      transition: color 0.3s;
    }
    .nav-tabs .nav-link.active {
      color: var(--dark-blue);
      background: transparent;
      border-bottom: 3px solid var(--red);
    }
    .nav-tabs .nav-link:hover {
      border-bottom: 3px solid var(--red);
      color: var(--dark-blue);
    }
    .filter-btn.btn-outline-secondary {
      color: var(--text-color);
      border-color: var(--input-border);
      background: transparent;
    }
    .filter-btn.btn-outline-secondary.active {
      background: var(--dark-blue);
      color: white;
      border-color: var(--dark-blue);
    }

    /* ===== ТАБЛИЦА ===== */
    .table-custom {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .table-custom thead {
      background: var(--dark-blue);
      color: white;
    }
    .table-custom th {
      font-weight: 600;
      padding: 0.9rem 0.6rem;
      cursor: pointer;
      border-bottom: 2px solid var(--red);
      white-space: nowrap;
      font-size: 0.9rem;
      transition: background 0.3s;
    }
    .table-custom td {
      padding: 0.6rem 0.5rem;
      vertical-align: middle;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
      color: var(--text-color);
    }
    .table-custom tr:hover {
      background: var(--hover-bg);
      cursor: pointer;
    }

    .athlete-photo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--red);
    }
    .athlete-name {
      font-weight: 600;
      color: var(--text-color);
    }
    .athlete-region {
      font-size: 0.75rem;
      color: var(--text-color);
      opacity: 0.7;
    }
    .rating-badge {
      background: var(--red);
      color: white;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      display: inline-block;
    }
    .price-tag {
      color: var(--dark-blue);
      font-weight: 700;
    }
    .category-badge {
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .category-top-men { background: #0d47a1; color: white; }
    .category-top-women { background: #880e4f; color: white; }
    .category-junior { background: #004d40; color: white; }
    .category-foreign { background: #4a148c; color: white; }
    .category-retired { background: #5d4037; color: white; }

    /* ===== МЕДАЛИ ===== */
    .medal-icon {
      font-size: 1.3rem;
      margin-right: 4px;
      cursor: help;
    }
    .medal-gold { color: var(--medal-gold); }
    .medal-silver { color: var(--medal-silver); }
    .medal-bronze { color: var(--medal-bronze); }

    /* ===== ПОИСК ===== */
    .search-input {
      border: 1px solid var(--input-border);
      border-radius: 25px;
      padding: 0.5rem 1.2rem;
      width: 100%;
      font-size: 0.95rem;
      background: var(--input-bg);
      color: var(--text-color);
      transition: background 0.3s, border 0.3s, color 0.3s;
    }
    .search-input:focus {
      border-color: var(--dark-blue);
      box-shadow: 0 0 0 0.2rem rgba(13, 71, 161, 0.25);
    }
    .search-input::placeholder {
      color: var(--text-color);
      opacity: 0.5;
    }

    /* ===== МОДАЛКА ===== */
    .modal-content {
      background: var(--card-bg);
      color: var(--text-color);
      border-radius: 16px;
      transition: background 0.3s, color 0.3s;
    }
    .modal-header {
      border-bottom: 2px solid var(--red);
      background: var(--dark-blue);
      color: white;
      border-radius: 16px 16px 0 0;
    }
    .modal-header .btn-close { filter: invert(1); }
    .modal-athlete-photo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--red);
    }
    .param-bar {
      height: 6px;
      background: var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 4px;
    }
    .param-bar .fill {
      height: 100%;
      background: var(--red);
      border-radius: 10px;
    }
    .info-box {
      background: var(--bg-body);
      padding: 0.7rem 1rem;
      border-radius: 8px;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .comment-box {
      background: var(--bg-body);
      border-left: 3px solid var(--red);
      padding: 0.7rem 1rem;
      border-radius: 8px;
      margin-top: 0.7rem;
      font-size: 0.9rem;
    }
    .achievement-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .achievement-item {
      background: var(--bg-body);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    /* ===== ПАГИНАЦИЯ ===== */
    .pagination-custom .page-link {
      color: var(--dark-blue);
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      transition: background 0.3s, color 0.3s, border 0.3s;
    }
    .pagination-custom .page-link:hover {
      background: var(--dark-blue);
      color: white;
    }
    .pagination-custom .page-item.active .page-link {
      background: var(--dark-blue);
      border-color: var(--dark-blue);
      color: white;
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 767.98px) {
      .navbar-custom .brand { font-size: 1.3rem; }
      .navbar-custom .brand img { height: 32px; }
      .navbar-custom .update-info { font-size: 0.7rem; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
      .lang-btn, .theme-btn { font-size: 0.65rem; padding: 0.1rem 0.5rem; }

      .stats-bar { padding: 1rem; }
      .stat-item .number { font-size: 1.4rem; }
      .stat-item .label { font-size: 0.7rem; }

      .tab-section { padding: 1rem; }
      .nav-tabs .nav-link { font-size: 0.8rem; padding: 0.4rem 0.6rem; }
      .filter-btn { font-size: 0.7rem; padding: 0.2rem 0.6rem; }

      .table-custom th:nth-child(5),
      .table-custom td:nth-child(5) { display: none; }
      .table-custom th:nth-child(6),
      .table-custom td:nth-child(6) { display: none; }
      .table-custom th:last-child,
      .table-custom td:last-child { display: none; }

      .table-custom th, .table-custom td {
        font-size: 0.75rem;
        padding: 0.4rem 0.3rem;
      }
      .athlete-photo { width: 36px; height: 36px; }
      .rating-badge { font-size: 0.7rem; padding: 0.1rem 0.5rem; }
      .price-tag { font-size: 0.8rem; }
      .medal-icon { font-size: 1rem; }

      .modal-athlete-photo { width: 80px; height: 80px; }
    }

    @media (max-width: 575.98px) {
      .table-custom th:nth-child(4),
      .table-custom td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- ===== НАВБАР ===== -->
<nav class="navbar-custom">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center flex-wrap">
      <!-- Логотип с обёрткой для клика -->
      <div class="brand" id="logoWrapper" onclick="toggleLogo()">
        <img id="logoImg" src="images/logo-light.png" alt="Biathlon Market" onerror="this.style.display='none'">
        <span>Biathlon<span>Market</span></span>
        <span class="logo-caption">Biathlon Market</span>
      </div>

      <div class="update-info">
        <span><i class="far fa-calendar-alt me-1"></i><span id="lastUpdated">2026-06-26</span></span>
        <!-- Кнопка смены темы -->
        <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">
          <i class="fas fa-moon"></i>
        </button>
        <!-- Кнопки языка -->
        <button class="lang-btn active" data-lang="ru" id="langRu">RU</button>
        <button class="lang-btn" data-lang="en" id="langEn">EN</button>
      </div>
    </div>
  </div>
</nav>

<main class="container">

  <!-- ===== СТАТИСТИКА ===== -->
  <div class="stats-bar">
    <div class="row">
      <div class="col-3 col-md-3 stat-item">
        <div class="number" id="totalAthletes">0</div>
        <div class="label" data-i18n="total">Всего</div>
      </div>
      <div class="col-3 col-md-3 stat-item">
        <div class="number" id="avgRating">0</div>
        <div class="label" data-i18n="avg_rating">Ср. рейтинг</div>
      </div>
      <div class="col-3 col-md-3 stat-item">
        <div class="number" id="topPrice">0</div>
        <div class="label" data-i18n="max_price">Макс. цена (€)</div>
      </div>
      <div class="col-3 col-md-3 stat-item">
        <div class="number" id="totalCategories">0</div>
        <div class="label" data-i18n="categories">Категорий</div>
      </div>
    </div>
  </div>

  <!-- ===== ВКЛАДКИ + ПОИСК ===== -->
  <div class="tab-section">
    <ul class="nav nav-tabs" id="categoryTabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-category="all" data-i18n="tab_all">Все</button></li>
      <li class="nav-item"><button class="nav-link" data-category="top-men" data-i18n="tab_men">🏆 Мужчины</button></li>
      <li class="nav-item"><button class="nav-link" data-category="top-women" data-i18n="tab_women">🏆 Женщины</button></li>
      <li class="nav-item"><button class="nav-link" data-category="junior" data-i18n="tab_junior">🌟 Юниоры</button></li>
      <li class="nav-item"><button class="nav-link" data-category="retired" data-i18n="tab_retired">⏳ Завершившие</button></li>
    </ul>
    <div class="row mt-3 g-2">
      <div class="col-md-6">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по имени или региону...">
      </div>
      <div class="col-md-6 d-flex align-items-center justify-content-md-end gap-2 flex-wrap">
        <span class="text-muted small" data-i18n="age_label">Возраст:</span>
        <button class="filter-btn btn btn-outline-secondary btn-sm active" data-age="all" data-i18n="age_all">Все</button>
        <button class="filter-btn btn btn-outline-secondary btn-sm" data-age="u23" data-i18n="age_u23">U-23</button>
        <button class="filter-btn btn btn-outline-secondary btn-sm" data-age="24-30" data-i18n="age_24_30">24-30</button>
        <button class="filter-btn btn btn-outline-secondary btn-sm" data-age="31+" data-i18n="age_31">31+</button>
      </div>
    </div>
  </div>

  <!-- ===== ТАБЛИЦА ===== -->
  <div class="table-custom">
    <div class="table-responsive">
      <table class="table table-custom table-hover mb-0" id="athletesTable">
        <thead>
          <tr>
            <th style="width:45px;">#</th>
            <th style="width:55px;" data-i18n="photo">Фото</th>
            <th data-sort="name" data-i18n="name_col">Имя <i class="fas fa-sort"></i></th>
            <th data-sort="age" data-i18n="age_col">Возраст <i class="fas fa-sort"></i></th>
            <th data-sort="region" data-i18n="region_col">Регион <i class="fas fa-sort"></i></th>
            <th data-sort="category" data-i18n="cat_col">Кат.</th>
            <th data-sort="rating" data-i18n="rating_col">Рейтинг <i class="fas fa-sort"></i></th>
            <th data-sort="price" data-i18n="price_col">Цена (€) <i class="fas fa-sort"></i></th>
            <th data-sort="change" data-i18n="change_col">Δ <i class="fas fa-sort"></i></th>
            <th style="width:30px;"></th>
          </tr>
        </thead>
        <tbody id="athletesBody">
          <!-- рендерится JS -->
        </tbody>
      </table>
    </div>
    <div class="d-flex justify-content-between align-items-center p-2">
      <div class="text-muted small" id="paginationInfo" data-i18n="pagination_info">Показано 0 из 0</div>
      <nav>
        <ul class="pagination pagination-custom mb-0" id="paginationControls"></ul>
      </nav>
    </div>
  </div>
</main>

<!-- ===== МОДАЛЬНОЕ ОКНО ===== -->
<div class="modal fade" id="athleteModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Карточка спортсмена</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

//  ПЕРЕВОДЫ (без изменений)
// =========================================================================

// =========================================================================
//  ТЕМА И ЛОГОТИП
// =========================================================================
let currentTheme = 'light'; // 'light' или 'dark'

function toggleTheme() {
  const body = document.body;
  const logo = document.getElementById('logoImg');
  const themeBtn = document.getElementById('themeToggle');

  if (currentTheme === 'light') {
    body.classList.add('dark-theme');
    logo.src = 'images/logo-dark.png';
    themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
    currentTheme = 'dark';
  } else {
    body.classList.remove('dark-theme');
    logo.src = 'images/logo-light.png';
    themeBtn.innerHTML = '<i class="fas fa-moon"></i>';
    currentTheme = 'light';
  }
}

// =========================================================================
//  УВЕЛИЧЕНИЕ ЛОГОТИПА ПРИ КЛИКЕ
// =========================================================================
let logoExpanded = false;

function toggleLogo() {
  const wrapper = document.getElementById('logoWrapper');
  logoExpanded = !logoExpanded;
  wrapper.classList.toggle('logo-expanded', logoExpanded);
}

// =========================================================================
//  ДАННЫЕ – РЕАЛЬНЫЕ / МАКСИМАЛЬНО ПРИБЛИЖЕННЫЕ (без изменений)
// =========================================================================
