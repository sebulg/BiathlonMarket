<html lang="ru">
<head>

    /* ===== ОСНОВНЫЕ ЦВЕТА ===== */
    :root {
      --dark-blue: #0d47a1;
      --red: #c62828;
      --light-bg: #f8f9fa;
      --text-dark: #212529;
      --gold: #ffc107;
      --silver: #9e9e9e;
      --bronze: #cd7f32;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--light-bg);
      color: var(--text-dark);
      padding-bottom: 2rem;
    }

    /* ===== НАВБАР ===== */
    .navbar-custom {
      background: var(--dark-blue);
      border-bottom: 3px solid var(--red);
      padding: 0.8rem 0;
    }

    .navbar-custom .brand {
      font-weight: 800;
      font-size: 1.6rem;
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .navbar-custom .brand span { color: var(--red); }
    .navbar-custom .brand img {
      height: 40px;
      width: auto;
    }
    .navbar-custom .update-info {
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
    }

    /* ===== СТАТИСТИКА ===== */
    .stats-bar {
      background: white;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin: 1.5rem 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid var(--red);
    }
    .stat-item .number {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--dark-blue);
    }
    .stat-item .label {
      font-size: 0.85rem;
      color: #6c757d;
    }

    /* ===== ВКЛАДКИ ===== */
    .tab-section {
      background: white;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 1.5rem;
    }
    .nav-tabs .nav-link {
      color: var(--text-dark);
      font-weight: 600;
      border: none;
      border-bottom: 3px solid transparent;
    }
    .nav-tabs .nav-link.active {
      color: var(--dark-blue);
      background: transparent;
      border-bottom: 3px solid var(--red);
    }
    .nav-tabs .nav-link:hover {
      border-bottom: 3px solid var(--red);
      color: var(--dark-blue);
    }
    .filter-btn.btn-outline-secondary {
      color: var(--text-dark);
      border-color: #ced4da;
    }
    .filter-btn.btn-outline-secondary.active {
      background: var(--dark-blue);
      color: white;
      border-color: var(--dark-blue);
    }

    /* ===== ТАБЛИЦА ===== */
    .table-custom {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .table-custom thead {
      background: var(--dark-blue);
      color: white;
    }
    .table-custom th {
      font-weight: 600;
      padding: 0.9rem 0.6rem;
      cursor: pointer;
      border-bottom: 2px solid var(--red);
      white-space: nowrap;
      font-size: 0.9rem;
    }
    .table-custom td {
      padding: 0.6rem 0.5rem;
      vertical-align: middle;
      border-bottom: 1px solid #e9ecef;
      font-size: 0.9rem;
    }
    .table-custom tr:hover {
      background: #f1f3f5;
      cursor: pointer;
    }

    .athlete-photo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--red);
    }
    .athlete-name {
      font-weight: 600;
      color: var(--text-dark);
    }
    .athlete-region {
      font-size: 0.75rem;
      color: #6c757d;
    }
    .rating-badge {
      background: var(--red);
      color: white;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      display: inline-block;
    }
    .price-tag {
      color: var(--dark-blue);
      font-weight: 700;
    }
    .category-badge {
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .category-top-men { background: #0d47a1; color: white; }
    .category-top-women { background: #880e4f; color: white; }
    .category-junior { background: #004d40; color: white; }
    .category-foreign { background: #4a148c; color: white; }

    .change-positive { color: #2e7d32; }
    .change-negative { color: #c62828; }
    .change-neutral { color: #6c757d; }
    .change-icon { font-size: 1rem; margin-right: 3px; }
    .change-tooltip { cursor: help; border-bottom: 1px dashed #6c757d; }

    /* ===== МЕДАЛИ ===== */
    .medal-icon {
      font-size: 1.3rem;
      margin-right: 4px;
      cursor: help;
    }
    .medal-gold { color: var(--gold); }
    .medal-silver { color: var(--silver); }
    .medal-bronze { color: var(--bronze); }

    /* ===== ПОИСК ===== */
    .search-input {
      border: 1px solid #ced4da;
      border-radius: 25px;
      padding: 0.5rem 1.2rem;
      width: 100%;
      font-size: 0.95rem;
    }
    .search-input:focus {
      border-color: var(--dark-blue);
      box-shadow: 0 0 0 0.2rem rgba(13, 71, 161, 0.25);
    }

    /* ===== МОДАЛКА ===== */
    .modal-content {
      background: white;
      color: var(--text-dark);
      border-radius: 16px;
    }
    .modal-header {
      border-bottom: 2px solid var(--red);
      background: var(--dark-blue);
      color: white;
      border-radius: 16px 16px 0 0;
    }
    .modal-header .btn-close { filter: invert(1); }
    .modal-athlete-photo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--red);
    }
    .param-bar {
      height: 6px;
      background: #e9ecef;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 4px;
    }
    .param-bar .fill {
      height: 100%;
      background: var(--red);
      border-radius: 10px;
    }
    .info-box {
      background: #f8f9fa;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .comment-box {
      background: #f8f9fa;
      border-left: 3px solid var(--red);
      padding: 0.7rem 1rem;
      border-radius: 8px;
      margin-top: 0.7rem;
      font-size: 0.9rem;
    }
    .achievement-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .achievement-item {
      background: #e9ecef;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    /* ===== ПАГИНАЦИЯ ===== */
    .pagination-custom .page-link {
      color: var(--dark-blue);
      border: 1px solid #dee2e6;
    }
    .pagination-custom .page-link:hover {
      background: var(--dark-blue);
      color: white;
    }
    .pagination-custom .page-item.active .page-link {
      background: var(--dark-blue);
      border-color: var(--dark-blue);
      color: white;
    }

    /* ===== АДАПТИВ ДЛЯ ТЕЛЕФОНА ===== */
    @media (max-width: 767.98px) {
      .navbar-custom .brand { font-size: 1.3rem; }
      .navbar-custom .brand img { height: 32px; }
      .navbar-custom .update-info { font-size: 0.7rem; }

      .stats-bar { padding: 1rem; }
      .stat-item .number { font-size: 1.4rem; }
      .stat-item .label { font-size: 0.7rem; }

      .tab-section { padding: 1rem; }
      .nav-tabs .nav-link { font-size: 0.8rem; padding: 0.4rem 0.6rem; }
      .filter-btn { font-size: 0.7rem; padding: 0.2rem 0.6rem; }

      /* Таблица – скрываем некоторые колонки */
      .table-custom th:nth-child(5),
      .table-custom td:nth-child(5) { display: none; } /* регион (дублируется) */
      .table-custom th:nth-child(6),
      .table-custom td:nth-child(6) { display: none; } /* категория (видна на бейдже) */
      .table-custom th:last-child,
      .table-custom td:last-child { display: none; } /* стрелка */

      .table-custom th, .table-custom td {
        font-size: 0.75rem;
        padding: 0.4rem 0.3rem;
      }
      .athlete-photo { width: 36px; height: 36px; }
      .rating-badge { font-size: 0.7rem; padding: 0.1rem 0.5rem; }
      .price-tag { font-size: 0.8rem; }
      .medal-icon { font-size: 1rem; }

      .modal-athlete-photo { width: 80px; height: 80px; }
    }

    @media (max-width: 575.98px) {
      /* На совсем маленьких экранах скрываем ещё и возраст */
      .table-custom th:nth-child(4),
      .table-custom td:nth-child(4) { display: none; }
    }
  </style>
</head>

  <!-- ===== ВКЛАДКИ + ПОИСК ===== -->

      <li class="nav-item"><button class="nav-link active" data-category="all">Все</button></li>
      <li class="nav-item"><button class="nav-link" data-category="top-men">🏆 Мужчины</button></li>
      <li class="nav-item"><button class="nav-link" data-category="top-women">🏆 Женщины</button></li>
      <li class="nav-item"><button class="nav-link" data-category="junior">🌟 Юниоры</button></li>

    </ul>
    <div class="row mt-3 g-2">
      <div class="col-md-6">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по имени или региону...">
      </div>
      <div class="col-md-6 d-flex align-items-center justify-content-md-end gap-2 flex-wrap">
        <span class="text-muted small">Возраст:</span>
        <button class="filter-btn btn btn-outline-secondary btn-sm active" data-age="all">Все</button>
        <button class="filter-btn btn btn-outline-secondary btn-sm" data-age="u23">U-23</button>
        <button class="filter-btn btn btn-outline-secondary btn-sm" data-age="24-30">24-30</button>
        <button class="filter-btn btn btn-outline-secondary btn-sm" data-age="31+">31+</button>
      </div>
    </div>
  </div>

  <!-- ===== ТАБЛИЦА ===== -->
  <div class="table-custom">
    <div class="table-responsive">
      <table class="table table-custom table-hover mb-0" id="athletesTable">
        <thead>
          <tr>
            <th style="width:45px;">#</th>
            <th style="width:55px;">Фото</th>
            <th data-sort="name">Имя <i class="fas fa-sort"></i></th>
            <th data-sort="age">Возраст <i class="fas fa-sort"></i></th>
            <th data-sort="region">Регион <i class="fas fa-sort"></i></th>
            <th data-sort="category">Кат.</th>
            <th data-sort="rating">Рейтинг <i class="fas fa-sort"></i></th>
            <th data-sort="price">Цена (€) <i class="fas fa-sort"></i></th>
            <th data-sort="change">Δ <i class="fas fa-sort"></i></th>
            <th style="width:30px;"></th>
          </tr>
        </thead>
        <tbody id="athletesBody">
          <!-- рендерится JS -->
        </tbody>
      </table>
    </div>
    <div class="d-flex justify-content-between align-items-center p-2">
      <div class="text-muted small" id="paginationInfo">Показано 0 из 0</div>
      <nav>
        <ul class="pagination pagination-custom mb-0" id="paginationControls"></ul>
      </nav>
    </div>
  </div>
</main>

<!-- ===== МОДАЛЬНОЕ ОКНО ===== -->
<div class="modal fade" id="athleteModal" tabindex="-1">

        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

// =========================================================================
//  JavaScript – логика с медалями и адаптивом
// =========================================================================

let allAthletes = [];
let filteredAthletes = [];
let currentPage = 1;
const perPage = 15;
let currentCategory = 'all';
let currentAgeFilter = 'all';
let currentSort = { column: 'rating', direction: 'desc' };

// ---- Инициализация ----
function loadData() {
  allAthletes = data.athletes || [];
  document.getElementById('lastUpdated').textContent = data.lastUpdated || 'неизвестно';
  applyFilters();
  updateStats();
}

function updateStats() {
  const total = allAthletes.length;
  document.getElementById('totalAthletes').textContent = total;
  if (!total) return;
  const avg = allAthletes.reduce((s, a) => s + a.rating, 0) / total;
  document.getElementById('avgRating').textContent = avg.toFixed(1);
  const top = Math.max(...allAthletes.map(a => a.price));
  document.getElementById('topPrice').textContent = (top / 1000).toFixed(0) + 'k';
  const cats = new Set(allAthletes.map(a => a.category));
  document.getElementById('totalCategories').textContent = cats.size;
}

// ---- Фильтры ----
function applyFilters() {
  let result = [...allAthletes];

  if (currentCategory !== 'all') {
    result = result.filter(a => a.category === currentCategory);
  }

  if (currentAgeFilter !== 'all') {
    result = result.filter(a => {
      if (currentAgeFilter === 'u23') return a.age < 23;
      if (currentAgeFilter === '24-30') return a.age >= 24 && a.age <= 30;
      if (currentAgeFilter === '31+') return a.age >= 31;
      return true;
    });
  }

  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  if (term) {
    result = result.filter(a =>
      a.name.toLowerCase().includes(term) ||
      a.region.toLowerCase().includes(term)
    );
  }

  // Сортировка
  result.sort((a, b) => {
    let va = a[currentSort.column] ?? '';
    let vb = b[currentSort.column] ?? '';
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return currentSort.direction === 'asc' ? -1 : 1;
    if (va > vb) return currentSort.direction === 'asc' ? 1 : -1;
    return 0;
  });

  filteredAthletes = result;
  currentPage = 1;
  renderTable();
}

// ---- Рендер таблицы ----
function renderTable() {
  const tbody = document.getElementById('athletesBody');
  const start = (currentPage - 1) * perPage;
  const pageData = filteredAthletes.slice(start, start + perPage);

  if (!pageData.length) {
    tbody.innerHTML = `<tr><td colspan="10" class="text-center py-3 text-muted">Никого не найдено</td></tr>`;
    updatePagination();
    return;
  }

  tbody.innerHTML = pageData.map((a, idx) => {
    const globalIdx = start + idx + 1;
    const catClass = {
      'top-men': 'category-top-men',
      'top-women': 'category-top-women',
      'junior': 'category-junior',
      'foreign': 'category-foreign'
    }[a.category] || '';

    // Изменение
    let changeHtml = '';
    if (a.change !== undefined) {
      if (a.change > 0) {
        changeHtml = `<span class="change-positive change-tooltip" title="${a.change_comment || ''}">
          <i class="fas fa-arrow-up change-icon"></i>+${a.change}</span>`;
      } else if (a.change < 0) {
        changeHtml = `<span class="change-negative change-tooltip" title="${a.change_comment || ''}">
          <i class="fas fa-arrow-down change-icon"></i>${a.change}</span>`;
      } else {
        changeHtml = `<span class="change-neutral" title="${a.change_comment || 'Без изменений'}">
          <i class="fas fa-minus change-icon"></i>0</span>`;
      }
    } else changeHtml = `<span class="change-neutral">—</span>`;

    return `
      <tr onclick="openModal(${a.id})">
        <td class="text-muted">${globalIdx}</td>
        <td><img src="images/athletes/${a.photo || 'default.jpg'}" alt="${a.name}" class="athlete-photo" onerror="this.src='images/athletes/default.jpg'"></td>
        <td><div class="athlete-name">${a.name}</div><div class="athlete-region">${a.region}</div></td>
        <td>${a.age}</td>
        <td>${a.region}</td>
        <td><span class="category-badge ${catClass}">${a.category}</span></td>
        <td><span class="rating-badge">${a.rating}</span></td>
        <td><span class="price-tag">€${a.price.toLocaleString()}</span></td>
        <td>${changeHtml}</td>
        <td><i class="fas fa-chevron-right text-muted"></i></td>
      </tr>
    `;
  }).join('');

  updatePagination();
}

// ---- Пагинация ----
function updatePagination() {
  const total = filteredAthletes.length;
  const totalPages = Math.ceil(total / perPage);
  document.getElementById('paginationInfo').textContent =
    `Показано ${Math.min(total, currentPage * perPage)} из ${total}`;

  const controls = document.getElementById('paginationControls');
  if (totalPages <= 1) { controls.innerHTML = ''; return; }

  let html = `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" onclick="goToPage(${currentPage-1})">«</a></li>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
      html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" onclick="goToPage(${i})">${i}</a></li>`;
    } else if (i === currentPage - 3 || i === currentPage + 3) {
      html += `<li class="page-item disabled"><a class="page-link">…</a></li>`;
    }
  }
  html += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><a class="page-link" onclick="goToPage(${currentPage+1})">»</a></li>`;
  controls.innerHTML = html;
}
function goToPage(p) {
  const total = Math.ceil(filteredAthletes.length / perPage);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderTable();
  window.scrollTo(0, 0);
}

// ---- МЕДАЛИ: генерация иконок с подсказками ----
function renderMedals(achievements) {
  if (!achievements || !achievements.length) return '';
  return achievements.map(text => {
    let medalClass = 'medal-gold';
    let title = text;
    // Определяем тип медали по ключевым словам
    if (text.toLowerCase().includes('бронз') || text.toLowerCase().includes('bronze')) {
      medalClass = 'medal-bronze';
    } else if (text.toLowerCase().includes('серебр') || text.toLowerCase().includes('silver')) {
      medalClass = 'medal-silver';
    } else if (text.toLowerCase().includes('золот') || text.toLowerCase().includes('gold') ||
               text.toLowerCase().includes('чемпион') || text.toLowerCase().includes('победитель')) {
      medalClass = 'medal-gold';
    } else {
      // Если нет явной медали – ставим золото за победу/титул, иначе серебро
      medalClass = text.toLowerCase().includes('призёр') ? 'medal-silver' : 'medal-gold';
    }
    return `<span class="medal-icon ${medalClass}" title="${text}"><i class="fas fa-medal"></i></span>`;
  }).join(' ');
}

// ---- Модальное окно ----
function openModal(id) {
  const a = allAthletes.find(x => x.id === id);
  if (!a) return;

  document.getElementById('modalTitle').textContent = a.name;
  const body = document.getElementById('modalBody');

  // Изменение
  let changeBlock = '';
  if (a.change !== undefined && a.change_comment) {
    const sign = a.change > 0 ? '+' : '';
    const color = a.change > 0 ? '#2e7d32' : (a.change < 0 ? '#c62828' : '#6c757d');
    changeBlock = `<div class="comment-box"><strong><i class="fas fa-exchange-alt me-2"></i>Изменение:</strong>
      <span style="color:${color};font-weight:700;">${sign}${a.change}</span><br>${a.change_comment}</div>`;
  }

  // Медали
  const medalsHtml = a.achievements && a.achievements.length
    ? `<div class="mt-2"><strong>Достижения:</strong>
        <div class="achievement-list">
          ${a.achievements.map(text => `<span class="achievement-item" title="${text}">${renderMedals([text])} ${text}</span>`).join('')}
        </div>
       </div>`
    : '';

  // Сезон и карьера (сезон используем как season_info)
  const seasonHtml = a.season_info
    ? `<div class="info-box"><strong><i class="fas fa-calendar-alt me-2"></i>Сезон 2025/26:</strong> ${a.season_info}</div>`
    : '';

  body.innerHTML = `
    <div class="row">
      <div class="col-md-4 text-center">
        <img src="images/athletes/${a.photo || 'default.jpg'}" alt="${a.name}" class="modal-athlete-photo mb-2" onerror="this.src='images/athletes/default.jpg'">
        <div><span class="category-badge ${{
          'top-men':'category-top-men','top-women':'category-top-women',
          'junior':'category-junior','foreign':'category-foreign'
        }[a.category] || ''}">${a.category}</span></div>
        <div class="text-muted small"><i class="fas fa-map-marker-alt me-1"></i>${a.region}<br><i class="fas fa-calendar-alt me-1"></i>${a.age} лет</div>
        <div class="mt-2"><span class="rating-badge" style="font-size:1.4rem;padding:0.3rem 1.2rem;">${a.rating}</span><div class="text-muted small">Рейтинг BM</div></div>
        <div class="mt-1"><span class="price-tag" style="font-size:1.6rem;">€${a.price.toLocaleString()}</span><div class="text-muted small">Рыночная стоимость</div></div>
        ${changeBlock}
        ${medalsHtml}
      </div>
      <div class="col-md-8">
        <h6 class="mb-2">Детальные параметры</h6>
        ${renderParam('Скорость', a.speed_sec || 0, 'сек')}
        ${renderParam('Стрельба лёжа', a.shoot_lying || 0, '%')}
        ${renderParam('Стрельба стоя', a.shoot_standing || 0, '%')}
        ${renderParam('Результаты (очки)', a.points || 0, '')}
        ${renderParam('Стабильность', a.stability || 0, '')}
        ${seasonHtml}
      </div>
    </div>
  `;

  new bootstrap.Modal(document.getElementById('athleteModal')).show();
}

function renderParam(label, value, unit) {
  const width = Math.min(value, 100);
  return `
    <div class="mb-2">
      <div class="d-flex justify-content-between small"><span>${label}</span><span>${value}${unit}</span></div>
      <div class="param-bar"><div class="fill" style="width:${width}%"></div></div>
    </div>
  `;
}

// ---- Обработчики событий ----
document.querySelectorAll('#categoryTabs .nav-link').forEach(tab => {
  tab.addEventListener('click', function(e) {
    e.preventDefault();
    document.querySelectorAll('#categoryTabs .nav-link').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentCategory = this.dataset.category;
    applyFilters();
  });
});

document.querySelectorAll('.filter-btn[data-age]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn[data-age]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentAgeFilter = this.dataset.age;
    applyFilters();
  });
});

document.querySelectorAll('[data-sort]').forEach(th => {
  th.addEventListener('click', function() {
    const col = this.dataset.sort;
    if (currentSort.column === col) currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
    else { currentSort.column = col; currentSort.direction = 'desc'; }
    applyFilters();
  });
});

let searchTimeout;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(applyFilters, 300);
});

// ---- Запуск ----
loadData();
</script>
