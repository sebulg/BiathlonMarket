<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biathlon Market – главная</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ===== ОБЩИЕ ПЕРЕМЕННЫЕ (темы) ===== */
    :root {
      --bg-body: #f8f9fa;
      --text-color: #212529;
      --card-bg: #ffffff;
      --card-shadow: 0 2px 8px rgba(0,0,0,0.06);
      --border-color: #e9ecef;
      --dark-blue: #0d47a1;
      --red: #c62828;
      --hero-bg: linear-gradient(135deg, #0a0e27 0%, #1a237e 100%);
      --hero-text: white;
    }
    body.dark-theme {
      --bg-body: #0a0e1a;
      --text-color: #e8eaf6;
      --card-bg: #1a1a2e;
      --card-shadow: 0 2px 8px rgba(0,0,0,0.4);
      --border-color: #2a2a4a;
      --dark-blue: #42a5f5;
      --red: #ef5350;
      --hero-bg: linear-gradient(135deg, #050812 0%, #0d1b3e 100%);
      --hero-text: #e8eaf6;
    }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg-body);
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
      margin: 0;
      padding: 0;
    }

    /* ===== НАВБАР ===== */
    .navbar-custom {
      background: var(--dark-blue);
      border-bottom: 3px solid var(--red);
      padding: 0.6rem 0;
      transition: background 0.3s;
      position: relative;
      z-index: 1000;
    }
    .navbar-custom .brand {
      font-weight: 800;
      font-size: 1.6rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
      border: none;
      background: none;
      padding: 0;
    }
    .navbar-custom .brand span { color: var(--red); }
    .navbar-custom .brand img {
      height: 40px;
      width: auto;
      transition: transform 0.3s;
    }
    .navbar-custom .nav-link {
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      transition: 0.2s;
    }
    .navbar-custom .nav-link:hover,
    .navbar-custom .nav-link.active {
      color: white;
      border-bottom: 2px solid var(--red);
    }
    .navbar-custom .nav-link i { margin-right: 5px; }
    .navbar-custom .update-info {
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .lang-btn, .theme-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .lang-btn:hover, .lang-btn.active, .theme-btn:hover {
      background: var(--red);
      border-color: var(--red);
    }
    .theme-btn i { font-size: 1rem; }

    /* ===== HERO (лого на весь экран) ===== */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--hero-bg);
      color: var(--hero-text);
      padding: 2rem;
      transition: background 0.3s;
      position: relative;
    }
    .hero .hero-logo {
      max-width: 300px;
      width: 80%;
      height: auto;
      display: block;
      margin: 0 auto 1.5rem;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
    }
    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    .hero h1 span { color: var(--red); }
    .hero p {
      font-size: 1.2rem;
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto 2rem;
    }
    .hero .btn-hero {
      background: var(--red);
      color: white;
      padding: 0.8rem 2.5rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .hero .btn-hero:hover {
      transform: scale(1.05);
      background: #b71c1c;
      color: white;
    }
    .scroll-indicator {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 1.5rem;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }

    /* ===== НОВОСТИ ===== */
    .news-section {
      padding: 3rem 0;
      background: var(--bg-body);
      transition: background 0.3s;
    }
    .news-section .section-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 2rem;
      color: var(--dark-blue);
      text-align: center;
    }
    .nav-tabs .nav-link {
      color: var(--text-color);
      font-weight: 600;
      border: none;
      border-bottom: 3px solid transparent;
    }
    .nav-tabs .nav-link.active {
      color: var(--dark-blue);
      background: transparent;
      border-bottom: 3px solid var(--red);
    }
    .tab-content {
      padding-top: 1.5rem;
    }
    .news-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--card-shadow);
      border-left: 4px solid var(--red);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .news-card .date {
      font-size: 0.8rem;
      color: var(--text-color);
      opacity: 0.6;
    }
    .news-card .title {
      font-weight: 700;
      font-size: 1.1rem;
      margin: 0.3rem 0;
    }
    .news-card .summary {
      color: var(--text-color);
      opacity: 0.8;
    }
    .transfer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-color);
    }
    .transfer-item .icon {
      font-size: 1.2rem;
      color: var(--red);
      min-width: 30px;
    }
    .transfer-item .details {
      flex: 1;
    }
    .transfer-item .player {
      font-weight: 700;
    }
    .transfer-item .club {
      font-weight: 600;
      color: var(--dark-blue);
    }

    /* ===== FULLSCREEN LOGO OVERLAY ===== */
    .logo-fullscreen-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      cursor: pointer;
      animation: fadeIn 0.4s ease;
    }
    .logo-fullscreen-overlay.active {
      display: flex;
    }
    .logo-fullscreen-overlay img {
      max-width: 80%;
      max-height: 60vh;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 40px rgba(255,255,255,0.1));
    }
    .logo-fullscreen-overlay .fullscreen-caption {
      color: white;
      font-size: 2rem;
      font-weight: 700;
      margin-top: 1.5rem;
      letter-spacing: 2px;
    }
    .logo-fullscreen-overlay .fullscreen-close {
      position: absolute;
      top: 30px;
      right: 40px;
      color: white;
      font-size: 2.5rem;
      cursor: pointer;
      transition: 0.3s;
      background: none;
      border: none;
    }
    .logo-fullscreen-overlay .fullscreen-close:hover {
      transform: rotate(90deg);
      color: var(--red);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 767px) {
      .hero .hero-logo { max-width: 200px; }
      .hero h1 { font-size: 2.5rem; }
      .hero p { font-size: 1rem; }
      .navbar-custom .brand { font-size: 1.3rem; }
      .navbar-custom .brand img { height: 32px; }
      .navbar-custom .update-info { font-size: 0.7rem; gap: 6px; }
      .lang-btn, .theme-btn { font-size: 0.65rem; padding: 0.1rem 0.5rem; }
      .news-section .section-title { font-size: 2rem; }
      .logo-fullscreen-overlay .fullscreen-caption { font-size: 1.2rem; }
      .logo-fullscreen-overlay .fullscreen-close { top: 20px; right: 20px; font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<!-- ===== НАВБАР ===== -->
<nav class="navbar navbar-expand-md navbar-custom">
  <div class="container">
    <button class="brand" id="logoNavBtn" onclick="openFullscreenLogo()">
      <img id="navLogoImg" src="images/logo-light.png" alt="Biathlon Market">
      <span>Biathlon<span>Market</span></span>
    </button>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="index.html"><i class="fas fa-home"></i> Главная</a></li>
        <li class="nav-item"><a class="nav-link" href="ratings.html"><i class="fas fa-table"></i> Рейтинг</a></li>
      </ul>
      <div class="update-info">
        <span><i class="far fa-calendar-alt me-1"></i><span id="lastUpdated">2026-06-26</span></span>
        <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">
          <i class="fas fa-moon"></i>
        </button>
        <button class="lang-btn active" data-lang="ru" id="langRu">RU</button>
        <button class="lang-btn" data-lang="en" id="langEn">EN</button>
      </div>
    </div>
  </div>
</nav>

<!-- ===== HERO (лого на весь экран) ===== -->
<section class="hero" id="hero">
  <div class="container">
    <img id="heroLogoImg" src="images/logo-light.png" alt="Biathlon Market" class="hero-logo">
    <h1>Biathlon <span>Market</span></h1>
    <p>Рейтинг биатлонистов по уникальной формуле. Цены, аналитика, трансферы.</p>
    <a href="ratings.html" class="btn-hero"><i class="fas fa-arrow-right me-2"></i>Перейти к рейтингу</a>
    <div class="scroll-indicator"><i class="fas fa-chevron-down"></i></div>
  </div>
</section>

<!-- ===== НОВОСТИ ===== -->
<section class="news-section" id="news">
  <div class="container">
    <h2 class="section-title" data-i18n="news_title">Новости биатлона</h2>
    <ul class="nav nav-tabs justify-content-center" id="newsTabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-world" data-i18n="tab_world">Мир</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-russia" data-i18n="tab_russia">Россия</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-transfers" data-i18n="tab_transfers">Трансферы</button></li>
    </ul>
    <div class="tab-content" id="newsTabContent">
      <div class="tab-pane fade show active" id="tab-world"></div>
      <div class="tab-pane fade" id="tab-russia"></div>
      <div class="tab-pane fade" id="tab-transfers"></div>
    </div>
  </div>
</section>

<!-- ===== FULLSCREEN LOGO OVERLAY ===== -->
<div class="logo-fullscreen-overlay" id="fullscreenOverlay" onclick="closeFullscreenLogo()">
  <button class="fullscreen-close" onclick="closeFullscreenLogo()"><i class="fas fa-times"></i></button>
  <img id="fullscreenLogoImg" src="images/logo-light.png" alt="Biathlon Market">
  <div class="fullscreen-caption">Biathlon Market</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// =========================================================================
//  ДАННЫЕ В МАССИВАХ (новости, трансферы)
// =========================================================================
const newsData = {
  world: [
    { date: '26 июня 2026', title: 'IBU утвердил изменения в календаре Кубка мира на сезон 2026/27', summary: 'Сезон стартует в Эстерсунде 29 ноября. В календаре 10 этапов, включая новый этап в Румынии.' },
    { date: '24 июня 2026', title: 'Йоханнес Бё объявил о намерении завершить карьеру после Олимпиады-2026', summary: 'Норвежский биатлонист подтвердил, что сезон 2026/27 станет для него последним.' },
    { date: '22 июня 2026', title: 'Сборная Франции провела контрольные старты в Лилле', summary: 'Лучшие результаты показали Эмильен Жаклен и Жюлия Симон.' },
    { date: '20 июня 2026', title: 'Швеция объявила состав на летний чемпионат мира', summary: 'В составе – Самуэльссон, Эберг, Магнуссон и молодая смена.' },
    { date: '18 июня 2026', title: 'Германия и Норвегия провели совместный сбор в Оберхофе', summary: 'Стороны обменялись опытом по подготовке к олимпийскому сезону.' }
  ],
  russia: [
    { date: '26 июня 2026', title: 'Карим Халили показал лучший результат на сборе в Увате', summary: 'Халили выиграл контрольную гонку с чистой стрельбой и лучшим кругом. Тренеры довольны его формой.' },
    { date: '25 июня 2026', title: 'Виктория Сливко вернулась к тренировкам после болезни', summary: 'Спортсменка приступила к работе в щадящем режиме, готовится к летнему чемпионату России.' },
    { date: '24 июня 2026', title: 'СБР утвердил состав сборной на летний чемпионат мира', summary: 'В состав вошли Халили, Бажин, Латыпов, Сливко, Резцова и молодые спортсмены.' },
    { date: '23 июня 2026', title: 'Юниорская сборная выиграла командный зачёт на Кубке Андерсен', summary: 'Российские юниоры взяли 4 золота и 3 серебра в личных гонках.' },
    { date: '21 июня 2026', title: 'Антон Шипулин назначен тренером-консультантом мужской сборной', summary: 'Легендарный биатлонист будет помогать молодым спортсменам и делиться опытом.' },
    { date: '19 июня 2026', title: 'Сборная России завершила сбор в Сочи', summary: 'Заключительные контрольные старты показали хорошую готовность команды к сезону.' }
  ],
  transfers: [
    { from: 'Новосибирская область', to: 'Московская область', players: ['Дюжева'] },
    { from: 'Новосибирская область', to: 'ХМАО-Югра', players: ['Еремин', 'Гришина', 'Домичек'] },
    { from: 'Мордовия', to: 'Московская область', players: ['Евменов'] },
    { from: 'Красноярский край', to: 'ХМАО-Югра', players: ['Томшина'] },
    { from: 'Свердловская область', to: 'ХМАО-Югра', players: ['Томшин'] },
    { from: 'Кировская область', to: 'ХМАО-Югра', players: ['Фоминых'] },
    { from: 'Татарстан', to: 'ХМАО-Югра', players: ['Батманова'] },
    { from: 'ХМАО-Югра', to: 'Пермский край', players: ['Бектуганов'] },
    { from: 'Татарстан', to: 'Тюменская область', players: ['Емерхонов'] }
  ]
};

// =========================================================================
//  РЕНДЕРИНГ НОВОСТЕЙ
// =========================================================================
function renderNews() {
  const worldContainer = document.getElementById('tab-world');
  const russiaContainer = document.getElementById('tab-russia');
  const transfersContainer = document.getElementById('tab-transfers');

  worldContainer.innerHTML = newsData.world.map(item => `
    <div class="news-card">
      <div class="date">${item.date}</div>
      <div class="title">${item.title}</div>
      <div class="summary">${item.summary}</div>
    </div>
  `).join('');

  russiaContainer.innerHTML = newsData.russia.map(item => `
    <div class="news-card">
      <div class="date">${item.date}</div>
      <div class="title">${item.title}</div>
      <div class="summary">${item.summary}</div>
    </div>
  `).join('');

  transfersContainer.innerHTML = `
    <div class="news-card">
      <div class="date">Трансферное окно – обновление</div>
      ${newsData.transfers.map(t => `
        <div class="transfer-item">
          <span class="icon"><i class="fas fa-arrow-right"></i></span>
          <div class="details">
            <span class="player">${t.players.join(', ')}</span>
            ${t.from} ➡️ <span class="club">${t.to}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// =========================================================================
//  ТЕМА, ЛОГОТИП, ПОЛНОЭКРАННЫЙ РЕЖИМ
// =========================================================================
let currentTheme = 'light';

function toggleTheme() {
  const body = document.body;
  const btn = document.getElementById('themeToggle');
  const navLogo = document.getElementById('navLogoImg');
  const heroLogo = document.getElementById('heroLogoImg');
  const fullscreenLogo = document.getElementById('fullscreenLogoImg');

  if (currentTheme === 'light') {
    body.classList.add('dark-theme');
    btn.innerHTML = '<i class="fas fa-sun"></i>';
    navLogo.src = 'images/logo-dark.png';
    heroLogo.src = 'images/logo-dark.png';
    fullscreenLogo.src = 'images/logo-dark.png';
    currentTheme = 'dark';
  } else {
    body.classList.remove('dark-theme');
    btn.innerHTML = '<i class="fas fa-moon"></i>';
    navLogo.src = 'images/logo-light.png';
    heroLogo.src = 'images/logo-light.png';
    fullscreenLogo.src = 'images/logo-light.png';
    currentTheme = 'light';
  }
}

// =========================================================================
//  ПОЛНОЭКРАННЫЙ ЛОГОТИП
// =========================================================================
function openFullscreenLogo() {
  const overlay = document.getElementById('fullscreenOverlay');
  const logoImg = document.getElementById('fullscreenLogoImg');
  // Берём текущий логотип из навбара (он уже правильный для темы)
  const navLogo = document.getElementById('navLogoImg');
  logoImg.src = navLogo.src;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeFullscreenLogo() {
  const overlay = document.getElementById('fullscreenOverlay');
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

// Закрытие по Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeFullscreenLogo();
  }
});

// =========================================================================
//  ЯЗЫК
// =========================================================================
const translations = {
  ru: {
    news_title: "Новости биатлона",
    tab_world: "Мир",
    tab_russia: "Россия",
    tab_transfers: "Трансферы"
  },
  en: {
    news_title: "Biathlon News",
    tab_world: "World",
    tab_russia: "Russia",
    tab_transfers: "Transfers"
  }
};
let currentLang = 'ru';

function updateLanguage(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = translations[lang][key] || key;
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    if (this.dataset.lang === currentLang) return;
    updateLanguage(this.dataset.lang);
  });
});

// =========================================================================
//  ИНИЦИАЛИЗАЦИЯ
// =========================================================================
renderNews();
updateLanguage('ru');
document.getElementById('lastUpdated').textContent = '2026-06-26';
</script>

</body>
</html>
