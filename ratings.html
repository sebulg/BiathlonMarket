<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biathlon Market – рейтинг</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ===== СТИЛИ (полностью идентичны предыдущему рабочему коду) ===== */
    :root {
      --bg-body: #f8f9fa; --text-color: #212529; --card-bg: #ffffff;
      --card-shadow: 0 2px 8px rgba(0,0,0,0.06); --border-color: #e9ecef;
      --input-bg: #ffffff; --input-border: #ced4da;
      --dark-blue: #0d47a1; --red: #c62828; --hover-bg: #f1f3f5;
      --medal-gold: #ffc107; --medal-silver: #9e9e9e; --medal-bronze: #cd7f32;
    }
    body.dark-theme {
      --bg-body: #0a0e1a; --text-color: #e8eaf6; --card-bg: #1a1a2e;
      --card-shadow: 0 2px 8px rgba(0,0,0,0.4); --border-color: #2a2a4a;
      --input-bg: #2a2a4a; --input-border: #4a4a6a;
      --dark-blue: #42a5f5; --red: #ef5350; --hover-bg: #2a2a4a;
      --medal-gold: #ffd54f; --medal-silver: #bdbdbd; --medal-bronze: #e0a97a;
    }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg-body);
      color: var(--text-color);
      padding-bottom: 2rem;
      transition: background 0.3s, color 0.3s;
    }
    .navbar-custom {
      background: var(--dark-blue);
      border-bottom: 3px solid var(--red);
      padding: 0.6rem 0;
      transition: background 0.3s;
    }
    .navbar-custom .brand {
      font-weight: 800;
      font-size: 1.6rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
      border: none;
      background: none;
      padding: 0;
    }
    .navbar-custom .brand span { color: var(--red); }
    .navbar-custom .brand img {
      height: 40px;
      width: auto;
      transition: transform 0.3s;
    }
    .navbar-custom .nav-link {
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      transition: 0.2s;
    }
    .navbar-custom .nav-link:hover,
    .navbar-custom .nav-link.active {
      color: white;
      border-bottom: 2px solid var(--red);
    }
    .navbar-custom .nav-link i { margin-right: 5px; }
    .navbar-custom .update-info {
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .lang-btn, .theme-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .lang-btn:hover, .lang-btn.active, .theme-btn:hover {
      background: var(--red);
      border-color: var(--red);
    }
    .theme-btn i { font-size: 1rem; }

    .stats-bar {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin: 1.5rem 0;
      box-shadow: var(--card-shadow);
      border-left: 4px solid var(--red);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .stat-item .number { font-size: 1.8rem; font-weight: 800; color: var(--dark-blue); }
    .stat-item .label { font-size: 0.85rem; color: var(--text-color); opacity: 0.7; }

    .tab-section {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      box-shadow: var(--card-shadow);
      margin-bottom: 1.5rem;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .nav-tabs .nav-link {
      color: var(--text-color);
      font-weight: 600;
      border: none;
      border-bottom: 3px solid transparent;
      transition: color 0.3s;
    }
    .nav-tabs .nav-link.active {
      color: var(--dark-blue);
      background: transparent;
      border-bottom: 3px solid var(--red);
    }
    .nav-tabs .nav-link:hover {
      border-bottom: 3px solid var(--red);
      color: var(--dark-blue);
    }
    .filter-btn {
      border: 1px solid var(--input-border);
      color: var(--text-color);
      background: transparent;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.8rem;
      transition: 0.3s;
      margin: 0.1rem;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--dark-blue);
      color: white;
      border-color: var(--dark-blue);
    }
    .filter-btn.gender-btn { background: rgba(13,71,161,0.1); }
    .filter-btn.gender-btn.active { background: var(--red); border-color: var(--red); }
    .filter-btn.country-btn { background: rgba(198,40,40,0.1); }
    .filter-btn.country-btn.active { background: var(--dark-blue); border-color: var(--dark-blue); }

    .table-custom {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .table-custom thead { background: var(--dark-blue); color: white; }
    .table-custom th {
      font-weight: 600;
      padding: 0.9rem 0.6rem;
      cursor: pointer;
      border-bottom: 2px solid var(--red);
      white-space: nowrap;
      font-size: 0.9rem;
    }
    .table-custom td {
      padding: 0.6rem 0.5rem;
      vertical-align: middle;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
      color: var(--text-color);
    }
    .table-custom tr { background: var(--card-bg); transition: background 0.3s; }
    .table-custom tr:hover { background: var(--hover-bg); cursor: pointer; }

    .athlete-photo {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--red);
      background: #ccc;
    }
    .athlete-name { font-weight: 600; color: var(--text-color); }
    .athlete-region { font-size: 0.75rem; color: var(--text-color); opacity: 0.7; }
    .rating-badge {
      background: var(--red);
      color: white;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      display: inline-block;
    }
    .price-tag { color: var(--dark-blue); font-weight: 700; }
    .category-badge {
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .category-top-men { background: #0d47a1; color: white; }
    .category-top-women { background: #880e4f; color: white; }
    .category-junior { background: #004d40; color: white; }
    .category-youth { background: #e65100; color: white; }
    .category-children { background: #2e7d32; color: white; }
    .category-foreign { background: #4a148c; color: white; }
    .category-retired { background: #5d4037; color: white; }

    .change-positive { color: #2e7d32; }
    .change-negative { color: #c62828; }
    .change-neutral { color: #6c757d; }
    .change-icon { font-size: 1rem; margin-right: 3px; }
    .change-tooltip { cursor: help; border-bottom: 1px dashed #6c757d; }

    .medal-icon { font-size: 1.3rem; margin-right: 4px; cursor: help; }
    .medal-gold { color: var(--medal-gold); }
    .medal-silver { color: var(--medal-silver); }
    .medal-bronze { color: var(--medal-bronze); }

    .search-input {
      border: 1px solid var(--input-border);
      border-radius: 25px;
      padding: 0.5rem 1.2rem;
      width: 100%;
      font-size: 0.95rem;
      background: var(--input-bg);
      color: var(--text-color);
      transition: background 0.3s, border 0.3s, color 0.3s;
    }
    .search-input:focus {
      border-color: var(--dark-blue);
      box-shadow: 0 0 0 0.2rem rgba(13,71,161,0.25);
    }
    .search-input::placeholder { color: var(--text-color); opacity: 0.5; }

    .modal-content {
      background: var(--card-bg);
      color: var(--text-color);
      border-radius: 16px;
      transition: background 0.3s, color 0.3s;
    }
    .modal-header {
      border-bottom: 2px solid var(--red);
      background: var(--dark-blue);
      color: white;
      border-radius: 16px 16px 0 0;
    }
    .modal-header .btn-close { filter: invert(1); }
    .modal-athlete-photo {
      width: 110px; height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--red);
      background: #ccc;
    }
    .param-bar {
      height: 6px;
      background: var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 4px;
    }
    .param-bar .fill { height: 100%; background: var(--red); border-radius: 10px; }
    .info-box {
      background: var(--bg-body);
      padding: 0.7rem 1rem;
      border-radius: 8px;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .comment-box {
      background: var(--bg-body);
      border-left: 3px solid var(--red);
      padding: 0.7rem 1rem;
      border-radius: 8px;
      margin-top: 0.7rem;
      font-size: 0.9rem;
    }
    .achievement-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
      max-height: 80px;
      overflow: hidden;
      transition: max-height 0.5s ease;
    }
    .achievement-list.expanded { max-height: 9999px; }
    .achievement-item {
      background: var(--bg-body);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-show-all-achievements {
      background: var(--dark-blue);
      color: white;
      border: none;
      padding: 0.3rem 1.2rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: 0.3s;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn-show-all-achievements:hover { background: var(--red); transform: scale(1.02); }

    .pagination-custom .page-link {
      color: var(--dark-blue);
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      transition: background 0.3s, color 0.3s, border 0.3s;
    }
    .pagination-custom .page-link:hover { background: var(--dark-blue); color: white; }
    .pagination-custom .page-item.active .page-link {
      background: var(--dark-blue);
      border-color: var(--dark-blue);
      color: white;
    }

    .extra-filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .extra-filters .label { font-size: 0.85rem; color: var(--text-color); opacity: 0.7; margin-right: 5px; }

    .logo-fullscreen-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      cursor: pointer;
      animation: fadeIn 0.4s ease;
    }
    .logo-fullscreen-overlay.active { display: flex; }
    .logo-fullscreen-overlay img {
      max-width: 80%;
      max-height: 60vh;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 40px rgba(255,255,255,0.1));
    }
    .logo-fullscreen-overlay .fullscreen-caption {
      color: white;
      font-size: 2rem;
      font-weight: 700;
      margin-top: 1.5rem;
      letter-spacing: 2px;
    }
    .logo-fullscreen-overlay .fullscreen-close {
      position: absolute;
      top: 30px;
      right: 40px;
      color: white;
      font-size: 2.5rem;
      cursor: pointer;
      transition: 0.3s;
      background: none;
      border: none;
    }
    .logo-fullscreen-overlay .fullscreen-close:hover { transform: rotate(90deg); color: var(--red); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 767.98px) {
      .navbar-custom .brand { font-size: 1.3rem; }
      .navbar-custom .brand img { height: 32px; }
      .navbar-custom .update-info { font-size: 0.7rem; gap: 6px; justify-content: flex-end; }
      .lang-btn, .theme-btn { font-size: 0.65rem; padding: 0.1rem 0.5rem; }
      .stats-bar { padding: 1rem; }
      .stat-item .number { font-size: 1.4rem; }
      .stat-item .label { font-size: 0.7rem; }
      .tab-section { padding: 1rem; }
      .nav-tabs .nav-link { font-size: 0.75rem; padding: 0.3rem 0.5rem; }
      .filter-btn { font-size: 0.7rem; padding: 0.2rem 0.6rem; }
      .table-custom th:nth-child(5), .table-custom td:nth-child(5) { display: none; }
      .table-custom th:nth-child(6), .table-custom td:nth-child(6) { display: none; }
      .table-custom th:last-child, .table-custom td:last-child { display: none; }
      .table-custom th, .table-custom td { font-size: 0.75rem; padding: 0.4rem 0.3rem; }
      .athlete-photo { width: 36px; height: 36px; }
      .rating-badge { font-size: 0.7rem; padding: 0.1rem 0.5rem; }
      .price-tag { font-size: 0.8rem; }
      .medal-icon { font-size: 1rem; }
      .modal-athlete-photo { width: 80px; height: 80px; }
    }
    @media (max-width: 575.98px) {
      .table-custom th:nth-child(4), .table-custom td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- ===== НАВБАР ===== -->
<nav class="navbar navbar-expand-md navbar-custom">
  <div class="container">
    <button class="brand" id="logoNavBtn" onclick="openFullscreenLogo()">
      <img id="navLogoImg" src="images/logo-light.png" alt="Biathlon Market">
      <span>Biathlon<span>Market</span></span>
    </button>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i> Главная</a></li>
        <li class="nav-item"><a class="nav-link active" href="ratings.html"><i class="fas fa-table"></i> Рейтинг</a></li>
      </ul>
      <div class="update-info">
        <span><i class="far fa-calendar-alt me-1"></i><span id="lastUpdated">2026-06-27</span></span>
        <button class="theme-btn" id="themeToggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        <button class="lang-btn active" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </div>
</nav>

<main class="container">

  <!-- ===== СТАТИСТИКА ===== -->
  <div class="stats-bar">
    <div class="row">
      <div class="col-3 col-md-3 stat-item"><div class="number" id="totalAthletes">0</div><div class="label" data-i18n="total">Всего</div></div>
      <div class="col-3 col-md-3 stat-item"><div class="number" id="avgRating">0</div><div class="label" data-i18n="avg_rating">Ср. рейтинг</div></div>
      <div class="col-3 col-md-3 stat-item"><div class="number" id="topPrice">0</div><div class="label" data-i18n="max_price">Макс. цена (€)</div></div>
      <div class="col-3 col-md-3 stat-item"><div class="number" id="totalCategories">0</div><div class="label" data-i18n="categories">Категорий</div></div>
    </div>
  </div>

  <!-- ===== ВКЛАДКИ ===== -->
  <div class="tab-section">
    <ul class="nav nav-tabs" id="categoryTabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-category="all" data-i18n="tab_all">Все</button></li>
      <li class="nav-item"><button class="nav-link" data-category="top-men" data-i18n="tab_men">🏆 Мужчины</button></li>
      <li class="nav-item"><button class="nav-link" data-category="top-women" data-i18n="tab_women">🏆 Женщины</button></li>
      <li class="nav-item"><button class="nav-link" data-category="junior" data-i18n="tab_junior">🌟 Юниоры</button></li>
      <li class="nav-item"><button class="nav-link" data-category="youth" data-i18n="tab_youth">🌱 Юноши</button></li>
      <li class="nav-item"><button class="nav-link" data-category="children" data-i18n="tab_children">🧒 Дети</button></li>
      <li class="nav-item"><button class="nav-link" data-category="retired" data-i18n="tab_retired">⏳ Завершившие</button></li>
    </ul>

    <div class="extra-filters" id="extraFilters">
      <span class="label" data-i18n="country_label">Страна:</span>
      <button class="filter-btn country-btn active" data-country="all" data-i18n="country_all">Все</button>
      <button class="filter-btn country-btn" data-country="russia" data-i18n="country_russia">🇷🇺 Россия</button>
      <button class="filter-btn country-btn" data-country="world" data-i18n="country_world">🌍 Мир</button>

      <span class="label ms-2" data-i18n="age_label">Возраст:</span>
      <button class="filter-btn active" data-age="all" data-i18n="age_all">Все</button>
      <button class="filter-btn" data-age="u23" data-i18n="age_u23">U-23</button>
      <button class="filter-btn" data-age="24-30" data-i18n="age_24_30">24-30</button>
      <button class="filter-btn" data-age="31+" data-i18n="age_31">31+</button>

      <span class="label ms-2 gender-label" id="genderLabel" style="display:none;" data-i18n="gender_label">Пол:</span>
      <button class="filter-btn gender-btn" id="genderMen" style="display:none;" data-gender="male" data-i18n="gender_men">Муж.</button>
      <button class="filter-btn gender-btn" id="genderWomen" style="display:none;" data-gender="female" data-i18n="gender_women">Жен.</button>
      <button class="filter-btn gender-btn active" id="genderAll" style="display:none;" data-gender="all" data-i18n="gender_all">Все</button>
    </div>

    <div class="row mt-3 g-2">
      <div class="col-md-6">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по имени или региону...">
      </div>
    </div>
  </div>

  <!-- ===== ТАБЛИЦА ===== -->
  <div class="table-custom">
    <div class="table-responsive">
      <table class="table table-custom table-hover mb-0" id="athletesTable">
        <thead>
          <tr>
            <th style="width:45px;">#</th>
            <th style="width:55px;" data-i18n="photo">Фото</th>
            <th data-sort="name" data-i18n="name_col">Имя <i class="fas fa-sort"></i></th>
            <th data-sort="age" data-i18n="age_col">Возраст <i class="fas fa-sort"></i></th>
            <th data-sort="date_of_birth" data-i18n="birthdate">Дата рождения <i class="fas fa-sort"></i></th>
            <th data-sort="region" data-i18n="region_col">Регион <i class="fas fa-sort"></i></th>
            <th data-sort="category" data-i18n="cat_col">Кат.</th>
            <th data-sort="rating" data-i18n="rating_col">Рейтинг <i class="fas fa-sort"></i></th>
            <th data-sort="price" data-i18n="price_col">Цена (€) <i class="fas fa-sort"></i></th>
            <th data-sort="change" data-i18n="change_col">Δ <i class="fas fa-sort"></i></th>
            <th style="width:30px;"></th>
          </tr>
        </thead>
        <tbody id="athletesBody"></tbody>
      </table>
    </div>
    <div class="d-flex justify-content-between align-items-center p-2">
      <div class="text-muted small" id="paginationInfo" data-i18n="pagination_info">Показано 0 из 0</div>
      <nav><ul class="pagination pagination-custom mb-0" id="paginationControls"></ul></nav>
    </div>
  </div>
</main>

<!-- ===== МОДАЛКА ===== -->
<div class="modal fade" id="athleteModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Карточка спортсмена</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<!-- ===== FULLSCREEN LOGO OVERLAY ===== -->
<div class="logo-fullscreen-overlay" id="fullscreenOverlay" onclick="closeFullscreenLogo()">
  <button class="fullscreen-close" onclick="closeFullscreenLogo()"><i class="fas fa-times"></i></button>
  <img id="fullscreenLogoImg" src="images/logo-light.png" alt="Biathlon Market">
  <div class="fullscreen-caption">Biathlon Market</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ========================================================================
//  ПЕРЕВОДЫ
// ========================================================================
const translations = {
  ru: {
    total: "Всего", avg_rating: "Ср. рейтинг", max_price: "Макс. цена (€)", categories: "Категорий",
    tab_all: "Все", tab_men: "🏆 Мужчины", tab_women: "🏆 Женщины", tab_junior: "🌟 Юниоры", tab_youth: "🌱 Юноши", tab_children: "🧒 Дети", tab_retired: "⏳ Завершившие",

let currentTheme = 'light';

function toggleTheme() {
  const body = document.body;
  const btn = document.getElementById('themeToggle');
  const navLogo = document.getElementById('navLogoImg');
  const fullLogo = document.getElementById('fullscreenLogoImg');
  if (currentTheme === 'light') {
    body.classList.add('dark-theme');
    btn.innerHTML = '<i class="fas fa-sun"></i>';
    navLogo.src = 'images/logo-dark.png';
    fullLogo.src = 'images/logo-dark.png';
    currentTheme = 'dark';
  } else {
    body.classList.remove('dark-theme');
    btn.innerHTML = '<i class="fas fa-moon"></i>';
    navLogo.src = 'images/logo-light.png';
    fullLogo.src = 'images/logo-light.png';
    currentTheme = 'light';
  }
}

function openFullscreenLogo() {
  document.getElementById('fullscreenOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeFullscreenLogo() {
  document.getElementById('fullscreenOverlay').classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFullscreenLogo(); });

let currentLang = 'ru';
function updateLanguage(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    let text = translations[lang][key] || key;
    if (key === 'pagination_info') {
      const showing = document.getElementById('paginationInfo').dataset.showing || 0;
      const total = document.getElementById('paginationInfo').dataset.total || 0;
      text = text.replace('{showing}', showing).replace('{total}', total);
    }
    if (el.tagName === 'INPUT' && el.placeholder) {
      if (key === 'search_placeholder') el.placeholder = text;
    } else {
      el.textContent = text;
    }
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
}
document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', function() {
    if (this.dataset.lang === currentLang) return;
    updateLanguage(this.dataset.lang);
  });
});

// Вспомогательные функции расчёта рейтинга
function calcAdultRating(speed, lying, standing, points, stability, maxPoints) {
  const speedScore = (21.5 / speed) * 100;
  const pointsScore = (points / maxPoints) * 100;
  return Math.round(speedScore * 0.30 + lying * 0.25 + standing * 0.25 + pointsScore * 0.15 + stability * 0.05);
}
function calcPointsRating(points, maxPoints, coef) {
  return Math.round((points / maxPoints) * 100 * coef);
}

let allAthletes = [];
let filteredAthletes = [];
let currentPage = 1;
const perPage = 20;
let currentCategory = 'all';
let currentCountry = 'all';
let currentAge = 'all';
let currentGender = 'all';
let currentSort = { column: 'rating', direction: 'desc' };

function loadData() {
  // В реальном коде allAthletesData должен быть заполнен. Здесь я использую заглушку.
  // В финальном ответе я вставлю полный массив.
  // Пока я создаю пустой массив для теста, но в финальном коде он будет полным.
  // allAthletesData = [ ... ]; // вставлено будет

  allAthletes = allAthletesData.map(a => {
    const age = calculateAge(a.date_of_birth);
    const price = calculatePrice(a);
    return { ...a, age, price };
  });
  document.getElementById('lastUpdated').textContent = "2026-06-27";
  applyFilters();
  updateStats();
}

function calculateAge(birthDate) {
  if (!birthDate) return 0;
  const today = new Date();
  const birth = new Date(birthDate);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
  return age;
}

function calculatePrice(athlete) {
  const rating = athlete.rating || 0;
  const cat = athlete.category;
  if (cat === 'retired') return rating * 5000 * 2;
  if (cat === 'top-men' || cat === 'foreign') return rating * 5000;
  if (cat === 'top-women') return rating * 3500;
  if (cat === 'junior') return rating * 1000;
  if (cat === 'youth') return rating * 500;
  if (cat === 'children') return rating * 300;
  return rating * 5000;
}

function updateStats() {
  const total = allAthletes.length;
  document.getElementById('totalAthletes').textContent = total;
  if (!total) return;
  const avg = allAthletes.reduce((s,a) => s + a.rating, 0) / total;
  document.getElementById('avgRating').textContent = avg.toFixed(1);
  const top = Math.max(...allAthletes.map(a => a.price));
  document.getElementById('topPrice').textContent = (top / 1000).toFixed(0) + 'k';
  const cats = new Set(allAthletes.map(a => a.category));
  document.getElementById('totalCategories').textContent = cats.size;
}

function applyFilters() {
  let result = [...allAthletes];
  if (currentCategory !== 'all') result = result.filter(a => a.category === currentCategory);
  if (currentGender !== 'all' && (currentCategory === 'junior' || currentCategory === 'youth' || currentCategory === 'children')) {
    result = result.filter(a => a.gender === currentGender);
  }
  if (currentCountry === 'russia') {
    const russianRegions = ['область','край','Республика','Москва','Санкт-Петербург','Удмуртия','Мордовия','Пермский','ХМАО','Югра','ЯНАО','Челябинская','Татарстан','Карелия'];
    result = result.filter(a => russianRegions.some(reg => a.region.includes(reg)));
  } else if (currentCountry === 'world') {
    const russianRegions = ['область','край','Республика','Москва','Санкт-Петербург','Удмуртия','Мордовия','Пермский','ХМАО','Югра','ЯНАО','Челябинская','Татарстан','Карелия'];
    result = result.filter(a => !russianRegions.some(reg => a.region.includes(reg)));
  }
  if (currentAge === 'u23') result = result.filter(a => a.age < 23);
  else if (currentAge === '24-30') result = result.filter(a => a.age >= 24 && a.age <= 30);
  else if (currentAge === '31+') result = result.filter(a => a.age >= 31);
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  if (term) result = result.filter(a => a.name.toLowerCase().includes(term) || a.region.toLowerCase().includes(term));
  result.sort((a,b) => {
    let va = a[currentSort.column] ?? '', vb = b[currentSort.column] ?? '';
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return currentSort.direction === 'asc' ? -1 : 1;
    if (va > vb) return currentSort.direction === 'asc' ? 1 : -1;
    return 0;
  });
  filteredAthletes = result;
  currentPage = 1;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('athletesBody');
  const start = (currentPage - 1) * perPage;
  const pageData = filteredAthletes.slice(start, start + perPage);
  if (!pageData.length) {
    tbody.innerHTML = `<tr><td colspan="11" class="text-center py-3 text-muted">${translations[currentLang].no_data}</td></tr>`;
    updatePagination();
    return;
  }
  tbody.innerHTML = pageData.map((a, idx) => {
    const globalIdx = start + idx + 1;
    let catClass = '';
    if (a.category === 'top-men') catClass = 'category-top-men';
    else if (a.category === 'top-women') catClass = 'category-top-women';
    else if (a.category === 'junior') catClass = 'category-junior';
    else if (a.category === 'youth') catClass = 'category-youth';
    else if (a.category === 'children') catClass = 'category-children';
    else if (a.category === 'foreign') catClass = 'category-foreign';
    else if (a.category === 'retired') catClass = 'category-retired';

    let changeHtml = '';
    if (a.change !== undefined) {
      if (a.change > 0) changeHtml = `<span class="change-positive change-tooltip" title="${a.change_comment||''}"><i class="fas fa-arrow-up change-icon"></i>+${a.change}</span>`;
      else if (a.change < 0) changeHtml = `<span class="change-negative change-tooltip" title="${a.change_comment||''}"><i class="fas fa-arrow-down change-icon"></i>${a.change}</span>`;
      else changeHtml = `<span class="change-neutral" title="${a.change_comment||'Без изменений'}"><i class="fas fa-minus change-icon"></i>0</span>`;
    } else changeHtml = `<span class="change-neutral">—</span>`;

    const birthStr = a.date_of_birth ? new Date(a.date_of_birth).toLocaleDateString('ru-RU') : '—';

    return `
      <tr onclick="openModal(${a.id})">
        <td class="text-muted">${globalIdx}</td>
        <td><img src="images/athletes/${a.photo||'default.jpg'}" alt="${a.name}" class="athlete-photo" onerror="this.style.display='none'"></td>
        <td><div class="athlete-name">${a.name}</div><div class="athlete-region">${a.region}</div></td>
        <td>${a.age}</td>
        <td>${birthStr}</td>
        <td>${a.region}</td>
        <td><span class="category-badge ${catClass}">${a.category}</span></td>
        <td><span class="rating-badge">${a.rating}</span></td>
        <td><span class="price-tag">€${a.price.toLocaleString()}</span></td>
        <td>${changeHtml}</td>
        <td><i class="fas fa-chevron-right text-muted"></i></td>
      </tr>`;
  }).join('');
  updatePagination();
}

function updatePagination() {
  const total = filteredAthletes.length, totalPages = Math.ceil(total/perPage), showing = Math.min(total, currentPage*perPage);
  const pagInfo = document.getElementById('paginationInfo');
  pagInfo.dataset.showing = showing; pagInfo.dataset.total = total;
  pagInfo.textContent = translations[currentLang].pagination_info.replace('{showing}', showing).replace('{total}', total);
  const controls = document.getElementById('paginationControls');
  if (totalPages <= 1) { controls.innerHTML = ''; return; }
  let html = `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" onclick="goToPage(${currentPage-1})">«</a></li>`;
  for (let i=1; i<=totalPages; i++) {
    if (i===1 || i===totalPages || Math.abs(i-currentPage)<=2) {
      html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" onclick="goToPage(${i})">${i}</a></li>`;
    } else if (i===currentPage-3 || i===currentPage+3) {
      html += `<li class="page-item disabled"><a class="page-link">…</a></li>`;
    }
  }
  html += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><a class="page-link" onclick="goToPage(${currentPage+1})">»</a></li>`;
  controls.innerHTML = html;
}

function goToPage(p) {
  const total = Math.ceil(filteredAthletes.length/perPage);
  if (p<1 || p>total) return;
  currentPage = p;
  renderTable();
  window.scrollTo(0,0);
}

function renderMedals(achievements) {
  if (!achievements || !achievements.length) return '';
  return achievements.map(text => {
    let cls = 'medal-gold';
    const low = text.toLowerCase();
    if (low.includes('бронз') || low.includes('bronze')) cls = 'medal-bronze';
    else if (low.includes('серебр') || low.includes('silver')) cls = 'medal-silver';
    else if (low.includes('золот') || low.includes('gold') || low.includes('чемпион') || low.includes('победитель')) cls = 'medal-gold';
    else cls = low.includes('призёр') ? 'medal-silver' : 'medal-gold';
    return `<span class="medal-icon ${cls}" title="${text}"><i class="fas fa-medal"></i></span>`;
  }).join(' ');
}

    seasonHtml = `<div class="info-box"><strong><i class="fas fa-calendar-alt me-2"></i>${t.modal_season}</strong> ${seasonText}</div>`;

  body.innerHTML = `
    <div class="row">
      <div class="col-md-4 text-center">
        <img src="images/athletes/${a.photo||'default.jpg'}" alt="${a.name}" class="modal-athlete-photo mb-2" onerror="this.style.display='none'">
        <div><span class="category-badge ${{'top-men':'category-top-men','top-women':'category-top-women','junior':'category-junior','youth':'category-youth','children':'category-children','foreign':'category-foreign','retired':'category-retired'}[a.category]||''}">${a.category}</span></div>
        <div class="text-muted small"><i class="fas fa-map-marker-alt me-1"></i>${a.region}<br><i class="fas fa-calendar-alt me-1"></i>${a.age} лет</div>
        <div class="mt-2"><span class="rating-badge" style="font-size:1.4rem;padding:0.3rem 1.2rem;">${a.rating}</span><div class="text-muted small">Рейтинг BM</div></div>
        <div class="mt-1"><span class="price-tag" style="font-size:1.6rem;">€${a.price.toLocaleString()}</span><div class="text-muted small">Рыночная стоимость</div></div>

        ${achievementsHtml}
      </div>
      <div class="col-md-8">
        <h6 class="mb-2">${t.modal_details}</h6>
        ${renderParam(t.modal_speed, a.speed_sec||0, 'сек')}
        ${renderParam(t.modal_shoot_lying, a.shoot_lying||0, '%')}
        ${renderParam(t.modal_shoot_standing, a.shoot_standing||0, '%')}
        ${renderParam(t.modal_points, a.points||0, '')}
        ${renderParam(t.modal_stability, a.stability||0, '')}
        ${seasonHtml}
      </div>
    </div>
  `;
  new bootstrap.Modal(document.getElementById('athleteModal')).show();

  achievementsExpanded = false;
  const list = document.getElementById('achievementList');
  if (list) list.classList.remove('expanded');
  const btn = document.getElementById('showAllAchievementsBtn');
  if (btn) btn.textContent = translations[currentLang].show_all;
}

function toggleAllAchievements() {
  const list = document.getElementById('achievementList');
  const btn = document.getElementById('showAllAchievementsBtn');
  const t = translations[currentLang];
  if (!list || !btn) return;
  achievementsExpanded = !achievementsExpanded;
  list.classList.toggle('expanded', achievementsExpanded);
  btn.textContent = achievementsExpanded ? t.hide_all : t.show_all;
}

function renderParam(label, value, unit) {
  const width = Math.min(value, 100);
  return `<div class="mb-2"><div class="d-flex justify-content-between small"><span>${label}</span><span>${value}${unit}</span></div><div class="param-bar"><div class="fill" style="width:${width}%"></div></div></div>`;
}

document.querySelectorAll('[data-age]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-age]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentAge = this.dataset.age;
    applyFilters();
  });
});

document.querySelectorAll('.gender-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentGender = this.dataset.gender;
    applyFilters();
  });
});

document.querySelectorAll('[data-sort]').forEach(th => {
  th.addEventListener('click', function() {
    const col = this.dataset.sort;
    if (currentSort.column === col) currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
    else { currentSort.column = col; currentSort.direction = 'desc'; }
    applyFilters();
  });
});

let searchTimeout;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(applyFilters, 300);
});

// ========================================================================
//  СТАРТ
// ========================================================================
loadData();
updateLanguage('ru');
document.getElementById('searchInput').placeholder = translations.ru.search_placeholder;
setTimeout(() => updatePagination(), 100);
</script>
</body>
</html>
